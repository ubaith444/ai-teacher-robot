# alembic.ini – Alembic migration configuration
# Run migrations: alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to the migrations directory (relative to this file)
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length for the "slug" part of autogenerated migration file names
truncate_slug_length = 40

# Database URL is read from the environment via env.py
# (do NOT hard-code the URL here; env.py reads from SYNC_DATABASE_URL)
sqlalchemy.url = postgresql+psycopg2://postgres:password@localhost:5432/attendance_db

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
